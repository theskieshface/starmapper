<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Star Projection</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel left-panel">
        <h1 class="panel-title">Hałeya's Star Mapper</h1>
        <div class="version-tag">v1.2.016</div>

        <form id="star-form" class="stack">
          <label>
            Star Name
            <input id="star-name" type="text" required placeholder="e.g. Sirius" />
          </label>

          <div class="coords-grid">
            <label>
              X (ly)
              <input id="star-x" type="number" step="0.0000000001" required placeholder="0" />
            </label>
            <label>
              Y (ly)
              <input id="star-y" type="number" step="0.0000000001" required placeholder="0" />
            </label>
            <label>
              Z (ly)
              <input id="star-z" type="number" step="0.0000000001" required placeholder="0" />
            </label>
          </div>

          <label>
            Spectral Type
            <input id="star-spectral" type="text" placeholder="e.g. A1V" />
          </label>

          <label>
            Temperature (K)
            <input id="star-temperature" type="number" step="1" placeholder="e.g. 9940" />
          </label>

          <label>
            Luminosity (L☉)
            <input id="star-luminosity" type="number" step="0.0000000001" placeholder="e.g. 25.4" />
          </label>

          <button type="submit">Add Star</button>
        </form>

        <div class="star-list-wrap">
          <h2>Stars</h2>
          <ul id="star-list" class="star-list"></ul>
        </div>
      </aside>

      <main class="viewer-panel">
        <div class="viewer-frame">
          <div id="viewer" aria-label="3D star map"></div>
          <div class="map-controls map-grid-controls">
            <label><input id="grid-xy" type="checkbox" checked /> XY Grid</label>
            <label><input id="grid-xz" type="checkbox" checked /> XZ Grid</label>
            <label><input id="grid-yz" type="checkbox" checked /> YZ Grid</label>
          </div>
          <div class="map-controls map-measure-controls">
            <button id="measure-mode-btn" type="button">Measure: Off</button>
            <div id="measure-hint" class="measure-hint">Enable measure mode to pick two stars.</div>
          </div>
          <button id="lum-tune-btn" type="button" class="map-toggle">Tune Luminosity: Off</button>
        </div>
      </main>

      <aside class="panel right-panel">
        <h2 id="selected-title">Selected Star</h2>
        <p id="selection-hint" class="subtitle">Click a star in the map to edit its data.</p>

        <form id="edit-form" class="stack disabled" autocomplete="off">
          <label>
            Name
            <input id="edit-name" type="text" />
          </label>

          <div class="coords-grid">
            <label>
              X (ly)
              <input id="edit-x" type="number" step="0.0000000001" />
            </label>
            <label>
              Y (ly)
              <input id="edit-y" type="number" step="0.0000000001" />
            </label>
            <label>
              Z (ly)
              <input id="edit-z" type="number" step="0.0000000001" />
            </label>
          </div>

          <label>
            Spectral Type
            <input id="edit-spectral" type="text" />
          </label>

          <label>
            Temperature (K)
            <input id="edit-temperature" type="number" step="1" />
          </label>

          <label>
            Luminosity (L☉)
            <input id="edit-luminosity" type="number" step="0.0000000001" />
          </label>

          <button id="delete-star" type="button" class="danger">Delete Star</button>
        </form>

        <div class="io-tools">
          <h2>Map Data</h2>
          <label>
            Import Mode
            <select id="import-mode">
              <option value="replace" selected>Replace Current Map</option>
              <option value="append">Append to Current Map</option>
            </select>
          </label>
          <button id="export-csv" type="button">Export CSV</button>
          <button id="import-csv-btn" type="button">Import CSV</button>
          <input id="import-csv-input" type="file" accept=".csv,text/csv" hidden />
        </div>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
